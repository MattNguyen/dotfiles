[env]
TERM = "xterm-256color"

[window]
padding.x = 8
padding.y = 8
decorations = "Buttonless"
opacity = 0.8
blur = true

[font]
normal = { family = "Hack Nerd Font Mono", style = "Regular" }
size = 13.00

[keyboard]
bindings = [
  { key = "Return", mods = "Command", action = "ToggleFullscreen" },
  { key = "Return", mods = "Shift", chars = "\u001b\r" },
]
